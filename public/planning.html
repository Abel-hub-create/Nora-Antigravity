<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NORA — Planning</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #020408; color: #e2e8f0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

  /* Layout */
  .layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; min-height: 100vh; background: rgba(10,18,35,0.7); border-right: 1px solid rgba(255,255,255,0.08); padding: 24px 16px; position: fixed; top: 0; left: 0; bottom: 0; overflow-y: auto; backdrop-filter: blur(52px); }
  .main { margin-left: 260px; padding: 32px; flex: 1; }

  /* Sidebar */
  .logo { font-size: 22px; font-weight: 700; color: #38bdf8; margin-bottom: 4px; letter-spacing: -0.5px; }
  .logo-sub { font-size: 11px; color: #475569; margin-bottom: 28px; }
  .nav-section { font-size: 10px; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 1px; margin: 20px 0 8px; }
  .nav-epic { display: flex; align-items: center; gap-8px; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 13px; color: #94a3b8; transition: all 0.15s; text-decoration: none; gap: 8px; }
  .nav-epic:hover, .nav-epic.active { background: rgba(56,189,248,0.1); color: #38bdf8; }
  .nav-epic .epic-code { font-size: 10px; font-weight: 700; background: rgba(56,189,248,0.15); color: #38bdf8; padding: 2px 6px; border-radius: 4px; flex-shrink: 0; }
  .nav-epic .epic-progress { margin-left: auto; font-size: 10px; color: #475569; }
  .nav-epic.done-all .epic-code { background: rgba(34,197,94,0.15); color: #22c55e; }

  /* Header */
  .page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .page-title { font-size: 26px; font-weight: 700; color: #f8fafc; }
  .page-subtitle { font-size: 13px; color: #475569; margin-top: 2px; }
  .sync-btn { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); color: #38bdf8; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; transition: all 0.15s; }
  .sync-btn:hover { background: rgba(56,189,248,0.2); }

  /* Workflow legend */
  .workflow-bar { display: flex; align-items: center; gap: 6px; background: rgba(10,18,35,0.5); border: 1px solid rgba(255,255,255,0.06); border-radius: 10px; padding: 10px 16px; margin-bottom: 28px; flex-wrap: wrap; }
  .wf-step { font-size: 11px; padding: 3px 8px; border-radius: 5px; font-weight: 500; }
  .wf-arrow { color: #334155; font-size: 12px; }

  /* Epic card */
  .epic-card { background: rgba(10,18,35,0.5); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; margin-bottom: 20px; overflow: hidden; }
  .epic-header { display: flex; align-items: center; gap: 12px; padding: 16px 20px; cursor: pointer; transition: background 0.15s; }
  .epic-header:hover { background: rgba(255,255,255,0.02); }
  .epic-badge { font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; flex-shrink: 0; }
  .epic-name { font-size: 15px; font-weight: 600; color: #e2e8f0; flex: 1; }
  .epic-meta { display: flex; align-items: center; gap: 10px; }
  .epic-count { font-size: 12px; color: #475569; }
  .epic-pct { font-size: 12px; font-weight: 600; color: #38bdf8; }
  .epic-chevron { color: #475569; font-size: 14px; transition: transform 0.2s; }
  .epic-card.open .epic-chevron { transform: rotate(90deg); }
  .progress-bar { height: 3px; background: rgba(255,255,255,0.06); }
  .progress-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #38bdf8); transition: width 0.3s; }
  .subtasks { padding: 0 20px 16px; display: none; }
  .epic-card.open .subtasks { display: block; }

  /* Subtask row */
  .subtask-row { display: flex; align-items: center; gap: 12px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
  .subtask-row:last-child { border-bottom: none; }
  .subtask-id { font-size: 11px; color: #475569; font-weight: 600; width: 36px; flex-shrink: 0; }
  .subtask-name { font-size: 13px; color: #cbd5e1; flex: 1; }
  .subtask-name.done { color: #475569; text-decoration: line-through; }
  .stage-pills { display: flex; gap: 3px; flex-wrap: wrap; }
  .stage-pill { font-size: 10px; padding: 2px 7px; border-radius: 4px; cursor: pointer; border: 1px solid transparent; transition: all 0.15s; white-space: nowrap; font-weight: 500; }
  .stage-pill.active { font-weight: 700; }
  .stage-pill:hover:not(.active) { filter: brightness(1.3); }
  .advance-btn { background: rgba(56,189,248,0.1); border: 1px solid rgba(56,189,248,0.2); color: #38bdf8; padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 11px; white-space: nowrap; transition: all 0.15s; flex-shrink: 0; }
  .advance-btn:hover { background: rgba(56,189,248,0.2); }
  .advance-btn:disabled { opacity: 0.3; cursor: default; }

  /* Stage colors */
  .s-todo { background: rgba(71,85,105,0.3); color: #64748b; border-color: rgba(71,85,105,0.3); }
  .s-todo.active { background: rgba(100,116,139,0.4); color: #94a3b8; border-color: #64748b; }
  .s-inprogress { background: rgba(234,179,8,0.15); color: #ca8a04; border-color: rgba(234,179,8,0.15); }
  .s-inprogress.active { background: rgba(234,179,8,0.3); color: #eab308; border-color: #eab308; }
  .s-review { background: rgba(249,115,22,0.15); color: #ea580c; border-color: rgba(249,115,22,0.15); }
  .s-review.active { background: rgba(249,115,22,0.3); color: #f97316; border-color: #f97316; }
  .s-i18n { background: rgba(168,85,247,0.15); color: #9333ea; border-color: rgba(168,85,247,0.15); }
  .s-i18n.active { background: rgba(168,85,247,0.3); color: #a855f7; border-color: #a855f7; }
  .s-security { background: rgba(239,68,68,0.15); color: #dc2626; border-color: rgba(239,68,68,0.15); }
  .s-security.active { background: rgba(239,68,68,0.3); color: #ef4444; border-color: #ef4444; }
  .s-verify { background: rgba(14,165,233,0.15); color: #0284c7; border-color: rgba(14,165,233,0.15); }
  .s-verify.active { background: rgba(14,165,233,0.3); color: #0ea5e9; border-color: #0ea5e9; }
  .s-docs { background: rgba(20,184,166,0.15); color: #0f766e; border-color: rgba(20,184,166,0.15); }
  .s-docs.active { background: rgba(20,184,166,0.3); color: #14b8a6; border-color: #14b8a6; }
  .s-done { background: rgba(34,197,94,0.15); color: #15803d; border-color: rgba(34,197,94,0.15); }
  .s-done.active { background: rgba(34,197,94,0.3); color: #22c55e; border-color: #22c55e; }

  /* Stats bar */
  .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .stat-card { background: rgba(10,18,35,0.5); border: 1px solid rgba(255,255,255,0.07); border-radius: 10px; padding: 14px 16px; }
  .stat-val { font-size: 24px; font-weight: 700; color: #38bdf8; }
  .stat-label { font-size: 11px; color: #475569; margin-top: 2px; }

  /* Loading */
  .loading { text-align: center; padding: 60px; color: #475569; }

  @media (max-width: 768px) {
    .sidebar { display: none; }
    .main { margin-left: 0; padding: 16px; }
    .stats-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">NORA</div>
    <div class="logo-sub">Planning · Dev tracker</div>
    <div class="nav-section">Epics</div>
    <div id="sidebar-epics"></div>
  </aside>
  <main class="main">
    <div class="page-header">
      <div>
        <div class="page-title">Planning NORA</div>
        <div class="page-subtitle">Workflow : todo → inprogress → review → i18n → security → verify → docs → done</div>
      </div>
      <button class="sync-btn" onclick="loadState()">⟳ Rafraîchir</button>
    </div>

    <div class="stats-row" id="stats-row">
      <div class="stat-card"><div class="stat-val" id="stat-total">—</div><div class="stat-label">Sous-tâches</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-done" style="color:#22c55e">—</div><div class="stat-label">Terminées</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-inprogress" style="color:#eab308">—</div><div class="stat-label">En cours</div></div>
      <div class="stat-card"><div class="stat-val" id="stat-pct">—</div><div class="stat-label">Progression</div></div>
    </div>

    <div class="workflow-bar">
      <span class="wf-step s-todo active">todo</span><span class="wf-arrow">›</span>
      <span class="wf-step s-inprogress active">inprogress</span><span class="wf-arrow">›</span>
      <span class="wf-step s-review active">review</span><span class="wf-arrow">›</span>
      <span class="wf-step s-i18n active">i18n</span><span class="wf-arrow">›</span>
      <span class="wf-step s-security active">security</span><span class="wf-arrow">›</span>
      <span class="wf-step s-verify active">verify</span><span class="wf-arrow">›</span>
      <span class="wf-step s-docs active">docs</span><span class="wf-arrow">›</span>
      <span class="wf-step s-done active">done</span>
    </div>

    <div id="epics-container"><div class="loading">Chargement…</div></div>
  </main>
</div>

<script>
const STAGES = ['todo','inprogress','review','i18n','security','verify','docs','done'];
const STAGE_LABELS = { todo:'Todo', inprogress:'In Progress', review:'PR Review', i18n:'i18n', security:'Security', verify:'Verify', docs:'Docs', done:'Done' };

const EPICS = [
  {
    id:'E1', name:'Auth & Utilisateurs', color:'#6366f1',
    subtasks:[
      {id:'1.1', name:'Système inscription / connexion (JWT, bcrypt, cookies)'},
      {id:'1.2', name:'Vérification email (Resend, tokens 1h)'},
      {id:'1.3', name:'Google OAuth (ID token → user link)'},
      {id:'1.4', name:'Réinitialisation mot de passe'},
      {id:'1.5', name:'Onboarding 6 étapes (langue, avatar, nom, matière)'},
      {id:'1.6', name:'Profil utilisateur (avatar base64, nom)'},
    ]
  },
  {
    id:'E2', name:'Import & Capture', color:'#f43f5e',
    subtasks:[
      {id:'2.1', name:'Import texte direct (textarea, simplifier)'},
      {id:'2.2', name:'Enregistrement vocal (Whisper API, MediaRecorder)'},
      {id:'2.3', name:'Capture photo multi-images (GPT-4 Vision OCR, max 15)'},
      {id:'2.4', name:'Instructions spécifiques (définitions + objectifs)'},
      {id:'2.5', name:'Vérification matière IA (contentVerificationService)'},
      {id:'2.6', name:'Dictée vocale inline (VoiceDictation, Web Speech API)'},
    ]
  },
  {
    id:'E3', name:'Génération IA & Contenu', color:'#10b981',
    subtasks:[
      {id:'3.1', name:'Service génération unifié (titre + synthèse + flashcards + quiz)'},
      {id:'3.2', name:'Agents pédagogiques par matière (subjectPrompts.js)'},
      {id:'3.3', name:'Sélection difficulté quiz (Facile / Moyen / Difficile) — premium'},
      {id:'3.4', name:'Pool 20 questions + shuffle aléatoire — premium'},
      {id:'3.5', name:'Détection langue auto (fr/en)'},
      {id:'3.6', name:'Pagination synthèse > 2500 chars'},
    ]
  },
  {
    id:'E4', name:'Étude (Synthèse, Flashcards, Quiz)', color:'#f59e0b',
    subtasks:[
      {id:'4.1', name:'Page synthèse (StudyDetail, pagination, formatMath)'},
      {id:'4.2', name:'Mode flashcards (navigation, timer, impression PDF)'},
      {id:'4.3', name:'Mode quiz (MCQ, score, explication, retry shuffle)'},
      {id:'4.4', name:'Mode révision (spaced repetition)'},
      {id:'4.5', name:'Édition synthèse / flashcards / quiz — premium'},
      {id:'4.6', name:'Partage synthèses (public share link)'},
    ]
  },
  {
    id:'E5', name:'Gamification (XP, Coins, Winstreak)', color:'#8b5cf6',
    subtasks:[
      {id:'5.1', name:'Système XP & niveaux (seuils fixes, events serveur)'},
      {id:'5.2', name:'Winstreak (calcul serveur, timezone, reset minuit)'},
      {id:'5.3', name:'Sacs de pièces level-up (coinBagService, taux par plan)'},
      {id:'5.4', name:'Boutique (shop, packs cartes, IAP Stripe placeholder)'},
      {id:'5.5', name:'Objectifs quotidiens (goals, DailyProgress, notifications)'},
      {id:'5.6', name:'Config XP admin (xp_config table, panel /admin/xp-config)'},
    ]
  },
  {
    id:'E6', name:'Classement & Saisons', color:'#06b6d4',
    subtasks:[
      {id:'6.1', name:'Système de saisons (cron reset, snapshot top 50)'},
      {id:'6.2', name:'Leaderboard top 50 (niveau DESC, XP DESC, countdown)'},
      {id:'6.3', name:'Badges (#N - SX, top 50 → user_badges)'},
      {id:'6.4', name:'Profils cliquables (UserProfileModal, portal z-9999)'},
      {id:'6.5', name:'Radar de compétences (quiz + exercices + mastery fusionnés)'},
    ]
  },
  {
    id:'E7', name:'Assistant NORA & Exercices', color:'#ec4899',
    subtasks:[
      {id:'7.1', name:'Chat Aron (conversations DB, historique 10 msgs, quotas)'},
      {id:'7.2', name:'Monk Mode /exs (analyse quiz_answers → GPT → exercices)'},
      {id:'7.3', name:'Analyse interro /ana (OCR photo → lacunes → exercices ciblés)'},
      {id:'7.4', name:'Correction exercices (per-item QCM local, open/pratique GPT)'},
      {id:'7.5', name:'TTS voix Jesse (ElevenLabs, tts-1-hd fable, feedbackNote)'},
      {id:'7.6', name:'Caméra réelle /ana (AnaCameraModal, getUserMedia)'},
    ]
  },
  {
    id:'E8', name:'Admin Panel', color:'#84cc16',
    subtasks:[
      {id:'8.1', name:'Auth admin 2FA TOTP (Google Authenticator, QR code)'},
      {id:'8.2', name:'Gestion utilisateurs (ban, plan, suppression cascade)'},
      {id:'8.3', name:'Annonces (CRUD, email HTML à tous les users)'},
      {id:'8.4', name:'Config plans & limites (LimitInput, toggle, dropdown)'},
      {id:'8.5', name:'Debug IA (modèle par user, status API keys)'},
      {id:'8.6', name:'Gestion saisons admin (/admin/seasons)'},
    ]
  },
  {
    id:'E9', name:'Infrastructure & DevOps', color:'#f97316',
    subtasks:[
      {id:'9.1', name:'Env DEV/PROD isolés (préfix dev_, PM2, deploy scripts)'},
      {id:'9.2', name:'Notifications push (VAPID, cron horaire Paris, SW)'},
      {id:'9.3', name:'Emails transactionnels (Resend, templates dark)'},
      {id:'9.4', name:'Planning automatisé (ce site + API /api/planning)'},
      {id:'9.5', name:'Sons UI (Minecraft click, AudioContext, préchargement)'},
      {id:'9.6', name:'Thèmes (dark/light/midnight/forest/aurora, CSS vars)'},
    ]
  },
  {
    id:'E10', name:'Classeur de cartes & Échanges', color:'#c4b5fd',
    subtasks:[
      {id:'10.1', name:'Migration DB (card_trade_requests, source enum +trade)'},
      {id:'10.2', name:'Backend — tradeRepository (createRequest, getInbox, acceptRequest tx)'},
      {id:'10.3', name:'Backend — tradeRoutes + cardRoutes collection endpoint'},
      {id:'10.4', name:'Card.jsx — long press (300ms, wasLong ref, onLongPress prop)'},
      {id:'10.5', name:'CardBinder.jsx — 26 slots fixes, flip, badge ×N, inbox button'},
      {id:'10.6', name:'CardDetailModal — agrandissement carte, bouton échange'},
      {id:'10.7', name:'TradeRequestModal — envoi demande par share code'},
      {id:'10.8', name:'TradeInbox — boîte de réception, accept/refuse'},
      {id:'10.9', name:'TradeExchangeModal — split view, SendAnimation flying cards'},
      {id:'10.10', name:'CardPickerModal — bottom-sheet, filtre rareté ±1, stock check'},
      {id:'10.11', name:'i18n — 29 clés trade.* en fr + en'},
      {id:'10.12', name:'Security — TOCTOU fix FOR UPDATE, rarity bypass fix server-side'},
    ]
  },
];

let STATE = {};

async function loadState() {
  try {
    const r = await fetch('/api/planning/state');
    STATE = await r.json();
  } catch(e) {
    try { STATE = JSON.parse(localStorage.getItem('nora_planning') || '{}'); } catch(_) { STATE = {}; }
  }
  render();
}

function getStatus(epicId, subtaskId) {
  const key = `${epicId}_${subtaskId}`;
  return (STATE[key] && STATE[key].status) || 'todo';
}

function stageIndex(s) { return STAGES.indexOf(s); }

async function advanceStage(epicId, subtaskId) {
  const cur = getStatus(epicId, subtaskId);
  const idx = stageIndex(cur);
  if (idx >= STAGES.length - 1) return;
  const next = STAGES[idx + 1];
  const key = `${epicId}_${subtaskId}`;
  STATE[key] = { ...(STATE[key] || {}), status: next };

  try {
    await fetch('/api/planning/subtask', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ epicId, subtaskId, updates: { status: next } })
    });
  } catch(e) {
    localStorage.setItem('nora_planning', JSON.stringify(STATE));
  }
  render();
}

async function setStage(epicId, subtaskId, stage) {
  const key = `${epicId}_${subtaskId}`;
  STATE[key] = { ...(STATE[key] || {}), status: stage };

  try {
    await fetch('/api/planning/subtask', {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ epicId, subtaskId, updates: { status: stage } })
    });
  } catch(e) {
    localStorage.setItem('nora_planning', JSON.stringify(STATE));
  }
  render();
}

function epicProgress(epic) {
  const done = epic.subtasks.filter(s => getStatus(epic.id, s.id) === 'done').length;
  return { done, total: epic.subtasks.length, pct: Math.round(done / epic.subtasks.length * 100) };
}

function render() {
  // Stats
  let totalTasks = 0, doneTasks = 0, inprogressTasks = 0;
  EPICS.forEach(e => e.subtasks.forEach(s => {
    const st = getStatus(e.id, s.id);
    totalTasks++;
    if (st === 'done') doneTasks++;
    if (st === 'inprogress') inprogressTasks++;
  }));
  document.getElementById('stat-total').textContent = totalTasks;
  document.getElementById('stat-done').textContent = doneTasks;
  document.getElementById('stat-inprogress').textContent = inprogressTasks;
  document.getElementById('stat-pct').textContent = Math.round(doneTasks / totalTasks * 100) + '%';

  // Sidebar
  const sb = document.getElementById('sidebar-epics');
  sb.innerHTML = EPICS.map(e => {
    const p = epicProgress(e);
    const allDone = p.done === p.total;
    return `<a class="nav-epic ${allDone ? 'done-all' : ''}" href="#${e.id}" onclick="scrollToEpic('${e.id}')">
      <span class="epic-code" style="background:${e.color}22;color:${e.color}">${e.id}</span>
      <span style="flex:1;font-size:12px">${e.name}</span>
      <span class="epic-progress">${p.done}/${p.total}</span>
    </a>`;
  }).join('');

  // Epics
  const container = document.getElementById('epics-container');
  container.innerHTML = EPICS.map(e => {
    const p = epicProgress(e);
    const isOpen = localStorage.getItem('nora_open_' + e.id) !== 'false';
    return `
    <div class="epic-card ${isOpen ? 'open' : ''}" id="${e.id}">
      <div class="epic-header" onclick="toggleEpic('${e.id}')">
        <span class="epic-badge" style="background:${e.color}22;color:${e.color}">${e.id}</span>
        <span class="epic-name">${e.name}</span>
        <span class="epic-meta">
          <span class="epic-count">${p.done}/${p.total} done</span>
          <span class="epic-pct" style="color:${p.pct===100?'#22c55e':'#38bdf8'}">${p.pct}%</span>
        </span>
        <span class="epic-chevron">›</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${p.pct}%;background:linear-gradient(90deg,${e.color}99,${e.color})"></div></div>
      <div class="subtasks">
        ${e.subtasks.map(s => {
          const cur = getStatus(e.id, s.id);
          const isDone = cur === 'done';
          const curIdx = stageIndex(cur);
          const pills = STAGES.map(st => {
            const isActive = st === cur;
            const cls = isActive ? `s-${st} active` : `s-${st}`;
            return `<span class="stage-pill ${cls}" onclick="setStage('${e.id}','${s.id}','${st}')" title="Passer à ${STAGE_LABELS[st]}">${STAGE_LABELS[st]}</span>`;
          }).join('');
          return `<div class="subtask-row">
            <span class="subtask-id">${s.id}</span>
            <span class="subtask-name ${isDone ? 'done' : ''}">${s.name}</span>
            <div class="stage-pills">${pills}</div>
            <button class="advance-btn" onclick="advanceStage('${e.id}','${s.id}')" ${isDone ? 'disabled' : ''}>
              ${isDone ? '✓' : '→ ' + (STAGE_LABELS[STAGES[curIdx + 1]] || 'done')}
            </button>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }).join('');
}

function toggleEpic(id) {
  const card = document.getElementById(id);
  const isOpen = card.classList.toggle('open');
  localStorage.setItem('nora_open_' + id, isOpen);
}

function scrollToEpic(id) {
  event.preventDefault();
  document.getElementById(id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

loadState();
</script>
</body>
</html>
